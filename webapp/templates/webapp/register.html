{% extends 'webapp/base.html' %}
{% load i18n %}

{% block content %}
<main class="max-w-2xl mx-auto py-10">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6">{% trans "Регистрация" %}</h1>
        <form method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">{% trans "Имя" %} *</label>
                    <input type="text" name="first_name" required class="w-full border rounded px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">{% trans "Фамилия" %} *</label>
                    <input type="text" name="last_name" required class="w-full border rounded px-4 py-2">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">{% trans "Телефон" %} *</label>
                <input type="tel" name="phone" required placeholder="+7 777 123 4567" pattern="^\+?\d{10,15}$" inputmode="numeric" id="register-phone" class="w-full border rounded px-4 py-2">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">{% trans "Улица" %} *</label>
                <input type="text" name="street" required placeholder="ул. Достык 12" class="w-full border rounded px-4 py-2">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">{% trans "Подъезд" %}</label>
                    <input type="text" name="entrance" placeholder="{% trans "Опционально" %}" class="w-full border rounded px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">{% trans "Квартира" %}</label>
                    <input type="text" name="apartment" placeholder="{% trans "Опционально" %}" class="w-full border rounded px-4 py-2">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">{% trans "Пароль" %} *</label>
                <input type="password" name="password" required class="w-full border rounded px-4 py-2">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">{% trans "Подтверждение пароля" %} *</label>
                <input type="password" name="password_confirm" required class="w-full border rounded px-4 py-2">
            </div>

            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 font-semibold">
                {% trans "Зарегистрироваться" %}
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Уже есть аккаунт? <a href="{% url 'login' %}" class="text-red-600 hover:text-red-700 font-semibold">{% trans "Войти" %}</a>
        </p>
    </div>
</main>
<!-- Modal for registration errors -->
{% if messages %}
<div id="error-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg p-6 max-w-lg w-full mx-4">
        <h3 class="text-xl font-semibold mb-3">{% trans "Ошибка при регистрации" %}</h3>
        <div class="mb-4">
            {% for message in messages %}
                <p class="text-sm text-gray-700 mb-1">{{ message }}</p>
            {% endfor %}
        </div>
        <div class="flex justify-end gap-3">
            <button id="modal-close" class="px-4 py-2 rounded border">{% trans "Закрыть" %}</button>
            <button id="modal-fix-phone" class="px-4 py-2 rounded bg-red-600 text-white">{% trans "Исправить номер" %}</button>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function(){
        const modal = document.getElementById('error-modal');
        if (!modal) return;
        const close = document.getElementById('modal-close');
        const fix = document.getElementById('modal-fix-phone');
        const phone = document.getElementById('register-phone');
        close.addEventListener('click', function(){ modal.remove(); if(phone) phone.focus(); });
        fix.addEventListener('click', function(){ modal.remove(); if(phone){ phone.focus(); phone.scrollIntoView({behavior:'smooth', block:'center'}); } });
    });
</script>
{% endif %}

<script>
    // Close modal on click outside or Esc
    document.addEventListener('DOMContentLoaded', function(){
        const modal = document.getElementById('error-modal');
        if (!modal) return;
        function removeModal() {
            if (modal && modal.parentElement) modal.remove();
            document.removeEventListener('keydown', escHandler);
        }
        function escHandler(e){ if (e.key === 'Escape') removeModal(); }
        // Click outside
        modal.addEventListener('click', function(e){ if (e.target === modal) removeModal(); });
        // Esc key
        document.addEventListener('keydown', escHandler);
    });
</script>
{% endblock %}
