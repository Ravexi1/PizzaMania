{% extends 'webapp/base.html' %}

{% block content %}
<main class="max-w-2xl mx-auto py-10">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6">Регистрация</h1>

        <form method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Имя *</label>
                    <input type="text" name="first_name" required class="w-full border rounded px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Фамилия *</label>
                    <input type="text" name="last_name" required class="w-full border rounded px-4 py-2">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Телефон *</label>
                <input type="tel" name="phone" required placeholder="+7 777 123 4567" class="w-full border rounded px-4 py-2">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Улица *</label>
                <input type="text" name="street" required placeholder="ул. Достык 12" class="w-full border rounded px-4 py-2">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Подъезд</label>
                    <input type="text" name="entrance" placeholder="Опционально" class="w-full border rounded px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Квартира</label>
                    <input type="text" name="apartment" placeholder="Опционально" class="w-full border rounded px-4 py-2">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Пароль *</label>
                <input type="password" name="password" required class="w-full border rounded px-4 py-2">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Подтверждение пароля *</label>
                <input type="password" name="password_confirm" required class="w-full border rounded px-4 py-2">
            </div>

            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 font-semibold">
                Зарегистрироваться
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Уже есть аккаунт? <a href="{% url 'login' %}" class="text-red-600 hover:text-red-700 font-semibold">Войти</a>
        </p>
    </div>
</main>
{% endblock %}
