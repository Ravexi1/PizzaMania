{% extends 'webapp/base.html' %}
{% load i18n %}

{% block content %}
<main class="max-w-md mx-auto py-10">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6 text-center">{% trans "Вход" %}</h1>
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">{% trans "Ваш номер телефона" %}</label>
                <input type="text" name="username" required id="login-username" class="w-full border rounded px-4 py-2">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">{% trans "Пароль" %}</label>
                <input type="password" name="password" required class="w-full border rounded px-4 py-2">
            </div>

            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 font-semibold">
                {% trans "Войти" %}
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            {% trans "Нет аккаунта?" %} <a href="{% url 'register' %}" class="text-red-600 hover:text-red-700 font-semibold">{% trans "Зарегистрироваться" %}</a>
        </p>
    </div>
</main>
<!-- login errors use toast notifications in base.html -->
{% endblock %}
